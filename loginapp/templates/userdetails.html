{% extends 'base.html'%}
{% block content %}
  
<div class="container mt-5">
  <div class="row justify-content-center">
    <div class="col-md-6">

           <div class="mb-3">
        <button class="btn btn-outline-success btn-sm" type="submit">UserDetails</button>
        </div>
          <div class="card shadow p-4">
        <form method="POST"  enctype="multipart/form-data" >
          {% csrf_token %}

          <div class="row">
            <div class="col-md-6 mb-3">
              <label class="form-label">First Name <label>
              <input type="text" name="first_name" class="form-control" required>
            </div>

         
            <div class="col-md-6 mb-3">
              <label class="form-label">  Last Name</label>
              <input type="text" name="last_name" class="form-control" required>
            </div>

           <div class="col-md-6 mb-3">
               <label class="form-label">Position</label>
               <select name="position" class="form-select" required>
    
                <option value="" selected disabled>Select Position</option>
                <option value="Full Time">Full Time</option>
                 <option value="Part Time">Part Time</option>
    
              </select>
            </div>
           
            <div class="col-md-6 mb-3">
              <label class="form-label">Company</label>
              <input type="text" name="company" class="form-control" required>
              </div>
                 <div class="col-md-6 mb-3">
              <label class="form-label">Designation</label>
              <select name="designation" class="form-select">
                <option value="">Junior developer</option>
                <option value="">Senior developer</option>
                
              </select>
            </div>

          
         <div class="col-md-6 mb-3">
              <label class="form-label">Experience</label>
              <select name="experience" class="form-select">
                <option value="">Fresher</option>
                <option>1 Year</option>
                <option>2 Years</option>
                <option>3+ Years</option>
              </select>
            </div>

           <div class="col-md-6 mb-3">
              <label class="form-label">State</label>
              <input type="text" name="state" class="form-control" required>
            </div>
            <div class="col-md-6 mb-3">
              <label class="form-label">city</label>
              <input type="text" name="city" class="form-control" required>
            </div>
           
         
            <div class="col-md-6 mb-3">
              <label class="form-label">Phone </label>
              <input type="tel" name="phone" class="form-control" required>
            </div>
             <div class="col-md-6 mb-3">
              <label class="form-label">email </label>
              <input type="email" name="email" class="form-control" required>
            </div>
            <div class="col-md-6 mb-3">
              <label class="form-label">address<label>
              <input type="address" name="address" class="form-control" required>
            </div>

            <!-- DOB -->
            <div class="col-md-6 mb-3">
              <label class="form-label">Dob</label>
              <input type="date" name="dob" class="form-control">
            </div>
           
            <div class="col-md-6 mb-3">
              <label class="form-label">Portfolio Link</label>
              <input type="url" name="portfolio" class="form-control" placeholder="https://...">
            </div>

            <div class="col-md-12 mb-3">
              <label class="form-label">Upload Resume</label>
              <input type="file" name="resume" class="form-control">
            </div>

          </div>

          <!-- Submit -->
          <div class="d-grid">
            <button type="submit" class="btn btn-success">
           Apply
            </button>
          </div>

          

        </form>

      </div>

    </div>
  </div>
</div>
{%endblock%}
