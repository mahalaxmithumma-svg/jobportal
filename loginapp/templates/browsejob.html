{% extends 'base.html' %}

{% block content %}
<style>
    body{
        background: linear-gradient(to right,rgb(43, 51, 146),rgba(189, 196, 189, 0.488));
    }
</style>

<form method="POST">
    {% csrf_token %}

    <div class="container mt-4">
        <div class="d-flex gap-2 mb-4">
            <input type="text" class="form-control" name="title" placeholder="Search job title">
            <input type="text" name="location" class="form-control" placeholder="Location">
            <button class="btn btn-success" type="submit">Search</button>
        </div>
    </div>
</form>

<div class="container ">
    <div class="row mb-4 ">
        {% for job in jobs %}
        <div class="col-md-4 mb-4"> 
            <div class="card shadow  w-100 h-100" style="height: 310px;">
                <div class="card-body">
                    <h5 class="card-title text-center">{{ job.title }}</h5>
                    <p class="card-text text-center"><strong>Company:</strong> {{ job.company }}</p>
                    <p class="card-text text-center"><strong>Location:</strong> {{ job.location }}</p>
                    <p class="card-text text-center"><strong>Salary:</strong> ₹{{ job.salary }}</p>
                    <p class="card-text text-center"><strong>Type:</strong> {{ job.job_type }}</p>
                    <p class="card-text text-center"><strong>Description:</strong> {{ job.description }}</p>
                
                   <div class="card-footer">

                    <a href="{% url 'apply_job' job.id %}" 
                       class="btn btn-primary w-100">
                        Apply 
                    </a>

                </div>
                </div>
            
                </div>
                
            
        </div>
        
        {% endfor %}
       
    </div>
    
</div>

{% endblock %}
