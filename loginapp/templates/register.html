{% extends 'base.html' %}

{% block content %}
<style>
  body {
  background: linear-gradient(to right, #1E3A8A, #F1F5F9);
}
label{
        font-weight: 600;
        font-weight: bolder;
        color: black;
    }
</style>
<div class="container mt-5 w-75">
  <div class="row justify-content-center">
    <div class="col-md-6">
      
      <div class="card shadow p-4">
        <h2 class="text-center mb-4">Register</h2>
          
        <form method="POST">
          {% csrf_token %}
           <div class="mb-3">
            <label class="form-label">username</label>
            <input type="text" class="form-control" name="username" placeholder="Enter username">
          </div>
          <div class="mb-3">
            <label class="form-label">Full Name</label>
            <input type="text" class="form-control" name="FullName" placeholder="Enter Full Name">
          </div>
           
          <div class="mb-3">
            <label class="form-label">Email</label>
            <input type="email" class="form-control" name="email" placeholder="Enter Email">
          </div>

          <div class="mb-3">
            <label class="form-label">Password</label>
            <input type="password" class="form-control" name="password" placeholder="Enter Password">
          </div>

          <div class="mb-3">
            <label class="form-label">Confirm Password</label>
            <input type="password" class="form-control" name="confirmpassword" placeholder="Confirm Password">
          </div>

          <div class="mb-3">
            <label class="form-label">Mobile Number</label>
            <input type="tel" class="form-control" name="mobileNo" placeholder="Enter Mobile Number" maxlength="10" pattern="[0-9]{10}">
          </div>

          <div class="d-grid">
            <button type="submit" class="btn btn-primary">Create Account</button>
          </div>

          <p class="text-center mt-3">
            Already have an account? <a href="/login/">Login</a>
          </p>
           <div class="mb-3">
        {% if msg %}
        <div class="alert alert-danger mt-3 text-center">{{ msg }}</div>
        {% endif %}
       </div>

        </form>
      </div>

    </div>
  </div>
</div>

{% endblock %}
