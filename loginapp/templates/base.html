<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Jobserach portal</title>
   <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">

   
</head>
   

<body>

<!-- 🔷 NAVBAR START -->
<nav class="navbar navbar-expand-lg navbar-white shadow text-center ">
<div class="container-fluid m-2 ">

    <a class="navbar-brand" href="{% url 'home' %}" style="background-color: blueviolet; text-align: center; color: white; padding: 10px; border-radius: 8px;"><i class="bi bi-bag me-2"></i>JobPortal</a>

     <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="navbarNav">

      <ul class="navbar-nav me-auto" style="margin-left:28%;">
        <li class="nav-item">
          <a class="nav-link" href="{% url 'home' %}">Home</a>
        </li>
        
        <!-- <li class="nav-item">
          <a class="nav-link" href="{% url 'companies' %}">Companies</a>
        </li> -->
        
        
        <li class="nav-item"><a href="{% url 'browsejob'%}" class="nav-link">Browse Jobs</a></li>
        <li class="nav-item"><a href="{% url 'appliedjobs'%}" class="nav-link">Applied Jobs</a></li>
      </ul>

     

      <!-- 👤 Auth -->
      <div class=" nav-right"> 
         <div class="d-flex align-items-center text-white ms-auto gap-3">
        Welcome {{ request.session.username}}
               <!-- Profile Icon -->
              
           <div class="dropdown">

    <!-- Profile Icon -->
    <a href="#" class="dropdown-toggle d-flex align-items-center"
       data-bs-toggle="dropdown">

        <img src="https://cdn-icons-png.flaticon.com/512/149/149071.png"
             width="28" height="28"
             style="background-color:#ffbb00; border-radius:50%; border:1px solid #7373aabc;">
    </a>

    <!-- Dropdown Menu -->
    <ul class="dropdown-menu dropdown-menu-end">

        <!-- View Profile -->
        <li>
            <a class="dropdown-item" href="{% url 'pro' %}">
                <i class="bi bi-person"></i> View Profile
            </a>
        </li>

        <!-- Edit Profile -->
        <li>
            {% if details %}
            <a class="dropdown-item" href="{% url 'profile'  %}">
                <i class="bi bi-pencil-square"></i> Edit Profile
            </a>
            {% else %}
            <a class="dropdown-item" href="/profile/">
                <i class="bi bi-pencil-square"></i> Edit Profile
            </a>
            {% endif %}
        </li>

        <!-- Applications -->
        <li>
            <a class="dropdown-item" href="{% url 'appliedjobs' %}">
                <i class="bi bi-file-earmark-text"></i> Applications
            </a>
        </li>

    </ul>
</div>
             <!-- <a href="{% url 'userdetails' %}" class="btn  btn-secondary btn-sm">userdetails</a> -->
      
            <a href="{% url 'login' %}" class="btn btn-outline-white  btn-sm" style="background-color: rgb(140, 18, 254);">Sign in</a>
            <!-- <a href="{% url 'register' %}" class="btn btn-warning btn-sm">Register</a>  -->
            <a class="btn btn-danger btn-sm" href="{% url 'logout' %}">Logout</a>
            
  </div>
      </div> 

    </div>
  </div>
</nav>

<!-- 🔷 NAVBAR END -->

<!-- 🔽 Page Content -->
{% block content %}
{% endblock %}
<style>
  .icon{
    border-radius: 100px;
    background-color: blue;
  }
</style>


</body>
</html>
